services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-werewolf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-werewolf}
      POSTGRES_DB: ${POSTGRES_DB:-werewolf}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-werewolf}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-werewolf}:${POSTGRES_PASSWORD:-werewolf}@postgres:5432/${POSTGRES_DB:-werewolf}
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://localhost:${BACKEND_PORT:-4000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
